<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧地图服务平台</title>
    <!-- 引入 HTML5 Boilerplate 的样式 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 保留原有自定义样式（如有） -->
    <style>
        /* 在 HTML5 Boilerplate 基础上叠加卡片样式 */
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #6b7a8a;
            margin-bottom: 50px;
        }
        .cards {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 320px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #eef2f6;
            transition: all 0.25s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .icon { font-size: 56px; margin-bottom: 20px; display: block; }
        .card h2 { font-size: 24px; font-weight: 600; color: #1a2a3a; margin-bottom: 10px; }
        .card p { font-size: 15px; color: #6b7a8a; line-height: 1.6; margin: 0; }
        .card .arrow { margin-top: 20px; font-size: 18px; color: #2c7da0; opacity: 0.6; transition: 0.2s; }
        .card:hover .arrow { opacity: 1; transform: translateX(4px); }
    </style>
</head>
<body>
<div class="container">
    <h1>🗺️ 智慧地图服务平台</h1>
    <p class="subtitle">空间数据管理 · 可视化分析 · 智能运维</p>
    <div style="text-align: right; margin-bottom: 20px;">
        <a href="/api/portal/logout" style="color: #8899aa; text-decoration: none; font-size: 14px; padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; transition: all 0.2s;" onmouseover="this.style.color='#667eea';this.style.borderColor='#667eea'" onmouseout="this.style.color='#8899aa';this.style.borderColor='#ddd'">🚪 退出登录</a>
    </div>
    <div class="cards">
        <a href="./map.html" class="card">
            <span class="icon">🌍</span>
            <h2>地图展示端</h2>
            <p>浏览点位、查看影像底图、点击获取详情</p>
            <span class="arrow">→</span>
        </a>
        <a href="./admin.html" class="card">
            <span class="icon">⚙️</span>
            <h2>运维管理端</h2>
            <p>增删改查点位、上传图片、数据维护</p>
            <span class="arrow">→</span>
        </a>
    </div>
</div>
</body>
</html>
