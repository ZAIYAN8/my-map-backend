<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧地图服务平台 - 旋转太阳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            position: relative;
        }

        /* 三个小太阳的容器（固定在左上角） */
        .suns {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
            display: flex;
            flex-direction: row;
            gap: 0;  /* 间隙通过偏移控制重叠 */
        }

        /* 小太阳的通用样式 */
        .sun {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ffdd77, #ff9900);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 160, 0, 0.5);
            /* 自转动画：3秒一圈，线性无限循环 */
            animation: spin 3s linear infinite;
            transform-origin: center center;
            /* 重叠：第二个和第三个向左偏移，实现约30%重叠（80px * 0.3 ≈ 24px） */
            margin-left: -24px;
        }

        /* 第一个不偏移（保持原始位置） */
        .sun:first-child {
            margin-left: 0;
        }

        /* 可选：增加小光芒（伪元素） */
        .sun::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            background: radial-gradient(circle, rgba(255,200,100,0.3), transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        /* 旋转动画 */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* 为了让太阳更生动，添加微小的浮动效果（可选） */
        .sun {
            transition: transform 0.2s ease;
        }
        .sun:hover {
            transform: scale(1.05);
            animation-play-state: paused;
        }

        /* 主要内容区 */
        .container {
            max-width: 1200px;
            width: 90%;
            margin: 40px auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #2c7da0;
            letter-spacing: 2px;
        }

        /* 卡片区域 */
        .cards {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card {
            background: white;
            width: 280px;
            padding: 30px 20px;
            border-radius: 24px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 1px solid #eaeef2;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 30px rgba(0,0,0,0.12);
        }

        .card .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .card h2 {
            color: #2c7da0;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .card p {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
        }

        /* 响应式：小屏幕时太阳缩小，偏移量相应调整 */
        @media (max-width: 700px) {
            .sun {
                width: 60px;
                height: 60px;
                margin-left: -18px;
            }
            .sun:first-child {
                margin-left: 0;
            }
            .cards {
                gap: 20px;
            }
            .card {
                width: 240px;
                padding: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 左上角三个自转的小太阳（约30%重叠） -->
    <div class="suns">
        <div class="sun"></div>
        <div class="sun"></div>
        <div class="sun"></div>
    </div>

    <div class="container">
        <h1>🗺️ 智慧地图服务平台</h1>

        <!-- 两个功能入口卡片 -->
        <div class="cards">
            <a href="/map.html" class="card">
                <div class="icon">🗺️</div>
                <h2>地图展示端</h2>
                <p>浏览点位、查看影像底图、点击获取详情</p>
            </a>
            <a href="/admin.html" class="card">
                <div class="icon">⚙️</div>
                <h2>运维管理端</h2>
                <p>增删改查点位、上传图片、数据维护</p>
            </a>
        </div>
    </div>
</body>
</html>
