<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地图展示 - 轮回眼结界</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        /* 地图容器相对定位，用于放置轮回眼Canvas */
        #map-container {
            position: relative;
            height: 100vh;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        /* 轮回眼Canvas覆盖在地图上，不遮挡交互 */
        .rinnegan-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;   /* 让点击穿透到地图 */
            z-index: 10;
            opacity: 0.3;           /* 半透明，不影响地图辨识 */
        }

        /* 右上角筛选栏 */
        .filter-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: rgba(255,255,255,0.95);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }
        .filter-bar select, .refresh-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .refresh-btn {
            background: #2c7da0;
            color: white;
        }

        /* 右侧信息面板 */
        .info-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            bottom: 20px;
            width: 420px;
            max-width: 90vw;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            padding: 20px;
            font-size: 15px;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(8px);
            border-left: 6px solid #3498db;
            overflow-y: auto;
        }
        .info-panel h3 {
            margin: 0 0 12px 0;
            color: #2c7da0;
            font-size: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 6px;
        }
        .info-panel img {
            max-width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin: 12px 0;
        }
        .info-panel p {
            margin: 8px 0;
            line-height: 1.5;
            color: #333;
        }
        .info-panel .location {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
            border-top: 1px dashed #ccc;
            padding-top: 8px;
        }
        .close-panel {
            float: right;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            color: #888;
        }
        .close-panel:hover { color: #333; }
        .empty-panel {
            color: #999;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .info-panel { width: 300px; top: 70px; right: 10px; bottom: 10px; }
            .filter-bar { top: 10px; right: 10px; padding: 6px 10px; }
        }
    </style>
</head>
<body>
<div id="map-container">
    <div id="map"></div>
    <!-- 轮回眼 Canvas 装饰层 -->
    <canvas id="rinneganCanvas" class="rinnegan-canvas"></canvas>
</div>

<div class="filter-bar">
    <span>📍 选择城市：</span>
    <select id="citySelect"><option value="all">全部</option></select>
    <button class="refresh-btn" onclick="location.reload();">🔄 刷新数据</button>
</div>
<div id="infoPanel" class="info-panel">
    <span class="close-panel" onclick="closePanel()">×</span>
    <div id="panelContent"><div class="empty-panel">✨ 点击地图上的标记<br>显示详细信息</div></div>
</div>

<script>
    // ------------------------------
    // 1. 地图初始化 (Leaflet)
    // ------------------------------
    const esriImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP',
        maxZoom: 18
    });
    const esriStreet = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri, HERE, Garmin, USGS',
        maxZoom: 18
    });
    const baseMaps = {
        "Esri 卫星影像": esriImagery,
        "Esri 电子地图": esriStreet
    };

    const map = L.map('map', {
        layers: [esriImagery],
        maxZoom: 18,
        minZoom: 3
    }).setView([25.78912, 100.195062], 10);
    L.control.layers(baseMaps, null, { position: 'bottomleft' }).addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    let allPointsData = [];

    async function loadPoints() {
        try {
            const res = await fetch('/api/points');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            allPointsData = data.features || [];
            const cities = new Set();
            allPointsData.forEach(f => {
                const city = f.properties.city;
                if (city && city.trim()) cities.add(city);
            });
            const citySelect = document.getElementById('citySelect');
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });
            filterByCity('all');
        } catch (err) {
            console.error('加载点位失败:', err);
            document.getElementById('panelContent').innerHTML = '<div class="empty-panel">❌ 加载点位数据失败</div>';
        }
    }

    function filterByCity(selected) {
        markersLayer.clearLayers();
        const filtered = (selected === 'all') ? allPointsData : allPointsData.filter(f => f.properties.city === selected);
        if (filtered.length === 0) return;
        const bounds = [];
        filtered.forEach(f => {
            const coords = f.geometry.coordinates;
            const latlng = [coords[1], coords[0]];
            bounds.push(latlng);
            const marker = L.marker(latlng).addTo(markersLayer);
            marker.on('click', () => showInfo(f.properties));
        });
        map.fitBounds(L.latLngBounds(bounds), { padding: [50, 50] });
    }

    function showInfo(props) {
        const panel = document.getElementById('infoPanel');
        const content = document.getElementById('panelContent');
        const imgUrl = props.image_url || '';
        content.innerHTML = `
            <h3>${escapeHtml(props.name) || '未命名'}</h3>
            ${imgUrl ? `<img src="${imgUrl}" alt="图片" onerror="this.onerror=null;this.src='';this.alt='图片加载失败'">` : ''}
            <p>${escapeHtml(props.description) || '暂无描述'}</p>
            <div class="location">📍 ${escapeHtml(props.city) || ''}${props.city && props.province ? '，' : ''}${escapeHtml(props.province) || ''}</div>
        `;
        panel.style.display = 'block';
    }

    function closePanel() { document.getElementById('infoPanel').style.display = 'none'; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    document.getElementById('citySelect').addEventListener('change', e => { filterByCity(e.target.value); closePanel(); });
    loadPoints();

    // ------------------------------
    // 2. 轮回眼绘制 (Canvas 装饰)
    // ------------------------------
    const canvas = document.getElementById('rinneganCanvas');
    let ctx = canvas.getContext('2d');
    let angle = 0;          // 勾玉旋转角度
    let animationId = null;

    function resizeCanvas() {
        const container = document.getElementById('map-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        drawRinnegan();
    }

    // 绘制一个勾玉 (中心在 (x,y), 半径 r, 旋转角度 rot)
    function drawTama(x, y, r, rot) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.beginPath();
        // 使用贝塞尔曲线绘制勾玉形状
        ctx.moveTo(0, -r);
        ctx.quadraticCurveTo(r * 0.8, -r * 0.6, r * 0.6, 0);
        ctx.quadraticCurveTo(r * 0.8, r * 0.6, 0, r);
        ctx.quadraticCurveTo(-r * 0.8, r * 0.6, -r * 0.6, 0);
        ctx.quadraticCurveTo(-r * 0.8, -r * 0.6, 0, -r);
        ctx.fillStyle = 'rgba(80, 60, 140, 0.7)';
        ctx.shadowBlur = 0;
        ctx.fill();
        // 中心圆点
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.25, 0, 2 * Math.PI);
        ctx.fillStyle = '#B87333';
        ctx.fill();
        ctx.restore();
    }

    function drawRinnegan() {
        if (!ctx) return;
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        const centerX = w / 2;
        const centerY = h / 2;
        const maxRadius = Math.min(w, h) * 0.35;   // 巨大但留边

        // 半透明紫色调
        ctx.save();
        ctx.globalAlpha = 0.28;   // 半透明，不遮挡地图

        // 1. 最外圈波纹
        for (let i = 0; i < 5; i++) {
            const r = maxRadius - i * (maxRadius / 6);
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, 2 * Math.PI);
            ctx.strokeStyle = `rgba(120, 100, 180, ${0.3 - i * 0.05})`;
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // 2. 内圈实心
        ctx.beginPath();
        ctx.arc(centerX, centerY, maxRadius * 0.75, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(60, 40, 100, 0.35)';
        ctx.fill();
        ctx.strokeStyle = '#a67c00';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // 3. 中心圆
        ctx.beginPath();
        ctx.arc(centerX, centerY, maxRadius * 0.25, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(180, 130, 50, 0.6)';
        ctx.fill();
        ctx.stroke();

        // 4. 勾玉阵列 (6个，绕中心旋转)
        const tamaRadius = maxRadius * 0.22;
        const orbitRadius = maxRadius * 0.55;
        const tamaCount = 6;
        for (let i = 0; i < tamaCount; i++) {
            const rad = angle + (i * Math.PI * 2 / tamaCount);
            const x = centerX + orbitRadius * Math.cos(rad);
            const y = centerY + orbitRadius * Math.sin(rad);
            drawTama(x, y, tamaRadius, rad + Math.PI / 2);
        }

        // 额外添加一圈小勾玉（可选，轮回眼细节）
        const smallOrbit = maxRadius * 0.38;
        const smallTamaRadius = maxRadius * 0.1;
        for (let i = 0; i < 12; i++) {
            const rad = -angle * 0.5 + (i * Math.PI * 2 / 12);
            const x = centerX + smallOrbit * Math.cos(rad);
            const y = centerY + smallOrbit * Math.sin(rad);
            ctx.beginPath();
            ctx.arc(x, y, smallTamaRadius, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(200, 160, 80, 0.5)';
            ctx.fill();
        }

        ctx.restore();
    }

    // 动画循环：缓慢旋转勾玉
    function animateRinnegan() {
        angle += 0.002;   // 每帧增加微小角度，约 10 秒一圈 (取决于帧率)
        drawRinnegan();
        animationId = requestAnimationFrame(animateRinnegan);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
    });

    // 在页面加载完成后启动
    window.addEventListener('load', () => {
        resizeCanvas();
        animateRinnegan();
    });
</script>
</body>
</html>
