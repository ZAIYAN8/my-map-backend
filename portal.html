<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧地图服务平台 - 外围警戒线+装饰特效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 整体背景虚化 */
        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format') center/cover no-repeat fixed;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.2);
            z-index: -1;
        }

        /* 主边框容器 */
        .frame {
            position: relative;
            width: 1100px;
            max-width: 90vw;
            min-height: 85vh;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.8);
            backdrop-filter: blur(0px);
            border: 2px solid rgba(255,255,240,0.6);
            overflow: hidden;
            margin: 30px;
            /* 警戒线伪元素放在最底层 */
            isolation: isolate;
        }

        /* 静态警戒线（覆盖边框区域约30%，不影响内部内容） */
        .frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #FFCC00,
                #FFCC00 12px,
                #000000 12px,
                #000000 24px
            );
            opacity: 0.3;          /* 控制覆盖强度，不遮挡内部 */
            mix-blend-mode: multiply; /* 产生混乱融合感 */
            pointer-events: none;   /* 让点击穿透 */
            z-index: 0;
            border-radius: 48px;
        }

        /* 确保内部内容在警戒线之上 */
        .frame canvas,
        .frame .cards-wrapper {
            position: relative;
            z-index: 1;
        }

        /* 装饰 Canvas，指针穿透 */
        #decorCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 卡片容器 */
        .cards-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            gap: 50px;
            flex-wrap: wrap;
            padding: 30px;
        }

        /* 卡片样式（无警戒线，简洁白色半透） */
        .card {
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 24px;
            border-radius: 36px;
            text-decoration: none;
            text-align: center;
            backdrop-filter: blur(2px);
            transition: transform 0.3s ease, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 12px 20px rgba(0,0,0,0.08);
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.2);
        }
        .card .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .card h2 {
            color: #2c7da0;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .card p {
            color: #4a5b66;
            font-size: 15px;
            line-height: 1.5;
        }

        @media (max-width: 800px) {
            .frame { width: 95vw; }
            .cards-wrapper { gap: 30px; padding: 20px; }
            .card { width: 260px; padding: 24px 16px; }
        }
    </style>
</head>
<body>
<div class="frame">
    <canvas id="decorCanvas"></canvas>
    <div class="cards-wrapper">
        <a href="/map.html" class="card">
            <div class="icon">🗺️</div>
            <h2>地图展示端</h2>
            <p>浏览点位、查看影像底图、点击获取详情</p>
        </a>
        <a href="/admin.html" class="card">
            <div class="icon">⚙️</div>
            <h2>运维管理端</h2>
            <p>增删改查点位、上传图片、数据维护</p>
        </a>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('decorCanvas');
        const frame = document.querySelector('.frame');
        let ctx = canvas.getContext('2d');
        let width, height;
        let angle = 0;
        let startTime = null;
        let swordTime = 0;

        let sunCenter = { x: 0, y: 0 };
        const sunRadius = 70;
        const triangleRadius = 100;
        const triSize = 16;
        const colors = ['#FF4D4D', '#4CAF50', '#2196F3'];
        let grassBase = { x: 0, y: 0 };
        let swordBase = { x: 0, y: 0 };
        let cameraPos = { x: 0, y: 0 };
        let frameRect = { left: 20, top: 20, right: 0, bottom: 0 };

        function updateSize() {
            const rect = frame.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width;
            canvas.height = height;

            sunCenter.x = sunRadius * 0.85;
            sunCenter.y = sunRadius * 0.85;

            grassBase.x = width - 110;
            grassBase.y = 95;
            swordBase.x = grassBase.x - 10;
            swordBase.y = grassBase.y + 8;
            cameraPos.x = 80;
            cameraPos.y = height - 80;
            frameRect = { left: 20, top: 20, right: width - 20, bottom: height - 20 };
        }

        function drawQuarterSun() {
            ctx.save();
            ctx.beginPath();
            ctx.arc(sunCenter.x, sunCenter.y, sunRadius, -Math.PI / 2, 0);
            ctx.lineTo(sunCenter.x, sunCenter.y);
            ctx.closePath();
            ctx.fillStyle = '#FFF9EA';
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255,200,100,0.6)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(sunCenter.x - 5, sunCenter.y - 5, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFF0';
            ctx.fill();
            for (let i = 0; i < 24; i++) {
                let rad = i * Math.PI * 2 / 24;
                let x1 = sunCenter.x + (sunRadius + 2) * Math.cos(rad);
                let y1 = sunCenter.y + (sunRadius + 2) * Math.sin(rad);
                let x2 = sunCenter.x + (sunRadius + 12) * Math.cos(rad);
                let y2 = sunCenter.y + (sunRadius + 12) * Math.sin(rad);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = '#FFD966';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawTriangle(x, y, color, angleRad) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angleRad);
            ctx.beginPath();
            const size = triSize;
            ctx.moveTo(0, -size);
            ctx.lineTo(size * 0.866, size * 0.5);
            ctx.lineTo(-size * 0.866, size * 0.5);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.restore();
        }

        function drawGrass() {
            ctx.save();
            ctx.translate(grassBase.x, grassBase.y);
            ctx.scale(1, -1);
            ctx.beginPath();
            for (let i = -30; i <= 30; i += 12) {
                ctx.moveTo(i, 0);
                ctx.quadraticCurveTo(i+6, -18, i+10, -8);
                ctx.quadraticCurveTo(i+2, -20, i, -6);
            }
            ctx.fillStyle = '#6B8E23';
            ctx.fill();
            for (let i = -25; i <= 25; i += 8) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i-4, -22);
                ctx.lineTo(i+4, -18);
                ctx.fill();
            }
            ctx.restore();
            ctx.beginPath();
            ctx.ellipse(grassBase.x - 6, grassBase.y + 5, 20, 10, 0, 0, Math.PI*2);
            ctx.fillStyle = '#8B5A2B';
            ctx.fill();
        }

        function drawSword(offsetY) {
            let x = swordBase.x;
            let y = swordBase.y + offsetY;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 18);
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(-4, -6, 8, 18);
            ctx.fillStyle = '#DAA520';
            ctx.fillRect(-2, -10, 4, 8);
            ctx.fillStyle = '#C0C0C0';
            ctx.beginPath();
            ctx.moveTo(0, -22);
            ctx.lineTo(-4, -8);
            ctx.lineTo(4, -8);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(0, -28);
            ctx.lineTo(-3, -22);
            ctx.lineTo(3, -22);
            ctx.fillStyle = '#E0E0E0';
            ctx.fill();
            ctx.restore();
        }

        function drawCamera() {
            let x = cameraPos.x, y = cameraPos.y;
            ctx.save();
            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.rect(x-35, y-25, 70, 50);
            ctx.fill();
            ctx.fillStyle = '#1A1F2E';
            ctx.beginPath();
            ctx.ellipse(x, y, 24, 24, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#4B6E8A';
            ctx.beginPath();
            ctx.ellipse(x, y, 18, 18, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#7F8C8D';
            ctx.beginPath();
            ctx.ellipse(x, y, 12, 12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#111';
            ctx.fillRect(x-20, y-35, 18, 12);
            ctx.font = 'bold 14px "Segoe UI"';
            ctx.fillStyle = '#F1C40F';
            ctx.fillText('NIKON', x-18, y-18);
            ctx.fillStyle = '#BDC3C7';
            ctx.fillRect(x+20, y-30, 12, 8);
            ctx.restore();
        }

        function drawTriangles(nowAngle) {
            for (let i = 0; i < 3; i++) {
                let triAngle = nowAngle + (i * Math.PI * 2 / 3);
                let tx = sunCenter.x + triangleRadius * Math.cos(triAngle);
                let ty = sunCenter.y + triangleRadius * Math.sin(triAngle);
                if (tx < frameRect.left || tx > frameRect.right || ty < frameRect.top || ty > frameRect.bottom) continue;
                drawTriangle(tx, ty, colors[i], triAngle + Math.PI/2);
            }
        }

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            let elapsed = (timestamp - startTime) / 1000;
            angle = (elapsed * Math.PI * 2 / 6) % (Math.PI * 2);
            swordTime = (elapsed % 5) / 5;
            let swordMove = Math.sin(swordTime * Math.PI * 2) * 5;

            updateSize();
            ctx.clearRect(0, 0, width, height);
            drawGrass();
            drawSword(swordMove);
            drawQuarterSun();
            drawTriangles(angle);
            drawCamera();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => updateSize());
        updateSize();
        startTime = null;
        requestAnimationFrame(animate);
    })();
</script>
</body>
</html>
