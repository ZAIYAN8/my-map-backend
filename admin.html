<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>运维管理后台 - 地图点位管理</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f4f9; }
        h1 { color: #2c7da0; }
        .container { max-width: 1400px; margin: auto; }
        .toolbar { margin-bottom: 20px; }
        button { background: #2c7da0; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        button.danger { background: #c0392b; }
        button.edit { background: #f39c12; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
        th { background: #2c7da0; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        img.preview { max-width: 60px; max-height: 60px; border-radius: 4px; }
        .form-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.3);
            width: 500px; max-width: 90%; z-index: 1000; display: none;
        }
        .form-popup input, .form-popup textarea { width: 100%; margin-bottom: 12px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .form-popup button { margin-top: 10px; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .status { margin: 10px 0; padding: 8px; background: #e7f3fe; border-left: 4px solid #2196F3; }
    </style>
</head>
<body>
<div class="container">
    <h1>🗺️ 地图点位运维管理</h1>
    <div class="toolbar">
        <button id="addBtn">➕ 添加新点位</button>
        <button id="refreshBtn">🔄 刷新列表</button>
    </div>
    <div id="statusMsg" class="status"></div>
    <table id="pointsTable">
        <thead>
            <tr><th>ID</th><th>名称</th><th>纬度</th><th>经度</th><th>图片</th><th>描述</th><th>省份</th><th>城市</th><th>操作</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="overlay" id="overlay"></div>
<div class="form-popup" id="formPopup">
    <h3 id="formTitle">添加点位</h3>
    <form id="pointForm">
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="名称 *" required>
        <input type="number" step="any" id="latitude" placeholder="纬度 *" required>
        <input type="number" step="any" id="longitude" placeholder="经度 *" required>
        <input type="text" id="province" placeholder="省份">
        <input type="text" id="city" placeholder="城市">
        <textarea id="description" rows="3" placeholder="描述"></textarea>
        <div>
            <label>图片上传：</label>
            <input type="file" id="imageFile" accept="image/*">
            <input type="hidden" id="existingImageUrl">
            <small>上传新图片会覆盖旧路径，不传则保留原有图片路径</small>
        </div>
        <button type="submit" id="submitBtn">保存</button>
        <button type="button" id="cancelBtn">取消</button>
    </form>
</div>

<script>
    let currentMode = 'add';

    async function fetchPoints() {
        try {
            const res = await fetch('/api/admin/points', { credentials: 'include' });
            if (res.status === 401) {
                window.location.href = '/login';
                return;
            }
            const points = await res.json();
            renderTable(points);
        } catch (err) {
            console.error('加载失败', err);
        }
    }

    function renderTable(points) {
        const tbody = document.querySelector('#pointsTable tbody');
        tbody.innerHTML = '';
        points.forEach(p => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p.id;
            row.insertCell(1).innerText = p.name;
            row.insertCell(2).innerText = p.latitude;
            row.insertCell(3).innerText = p.longitude;
            const imgCell = row.insertCell(4);
            if (p.image_url) {
                const img = document.createElement('img');
                img.src = p.image_url;
                img.className = 'preview';
                img.onerror = () => { img.src = ''; img.alt = '加载失败'; };
                imgCell.appendChild(img);
            } else {
                imgCell.innerText = '无';
            }
            row.insertCell(5).innerText = p.description || '';
            row.insertCell(6).innerText = p.province || '';
            row.insertCell(7).innerText = p.city || '';
            const actions = row.insertCell(8);
            const editBtn = document.createElement('button');
            editBtn.innerText = '编辑';
            editBtn.className = 'edit';
            editBtn.onclick = () => openEditForm(p);
            const delBtn = document.createElement('button');
            delBtn.innerText = '删除';
            delBtn.className = 'danger';
            delBtn.onclick = () => deletePoint(p.id);
            actions.appendChild(editBtn);
            actions.appendChild(delBtn);
        });
    }

    async function uploadImage(file) {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/upload', {
            method: 'POST',
            body: formData,
            credentials: 'include'
        });
        const data = await res.json();
        if (res.ok) return data.image_url;
        else throw new Error(data.error);
    }

    async function savePoint(data, mode, id = null) {
        let url = '/api/admin/points';
        let method = 'POST';
        if (mode === 'edit') {
            url = `/api/admin/points/${id}`;
            method = 'PUT';
        }
        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
            credentials: 'include'
        });
        if (!res.ok) throw new Error('保存失败');
        return await res.json();
    }

    async function deletePoint(id) {
        if (confirm('确定删除该点位吗？')) {
            await fetch(`/api/admin/points/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            showStatus('删除成功', 'success');
            fetchPoints();
        }
    }

    function openEditForm(point) {
        currentMode = 'edit';
        document.getElementById('formTitle').innerText = '编辑点位';
        document.getElementById('editId').value = point.id;
        document.getElementById('name').value = point.name;
        document.getElementById('latitude').value = point.latitude;
        document.getElementById('longitude').value = point.longitude;
        document.getElementById('province').value = point.province || '';
        document.getElementById('city').value = point.city || '';
        document.getElementById('description').value = point.description || '';
        document.getElementById('existingImageUrl').value = point.image_url || '';
        document.getElementById('imageFile').value = '';
        showForm(true);
    }

    function showForm(show) {
        document.getElementById('overlay').style.display = show ? 'block' : 'none';
        document.getElementById('formPopup').style.display = show ? 'block' : 'none';
    }

    function showStatus(msg, type) {
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.innerHTML = msg;
        statusDiv.style.background = type === 'error' ? '#fde7e7' : '#e7f3fe';
        statusDiv.style.borderLeftColor = type === 'error' ? '#c0392b' : '#2196F3';
        setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
    }

    document.getElementById('addBtn').onclick = () => {
        currentMode = 'add';
        document.getElementById('formTitle').innerText = '添加点位';
        document.getElementById('pointForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('existingImageUrl').value = '';
        showForm(true);
    };
    document.getElementById('cancelBtn').onclick = () => showForm(false);
    document.getElementById('overlay').onclick = () => showForm(false);

    document.getElementById('pointForm').onsubmit = async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const latitude = parseFloat(document.getElementById('latitude').value);
        const longitude = parseFloat(document.getElementById('longitude').value);
        if (!name || isNaN(latitude) || isNaN(longitude)) {
            showStatus('请填写名称和有效的经纬度', 'error');
            return;
        }
        const province = document.getElementById('province').value;
        const city = document.getElementById('city').value;
        const description = document.getElementById('description').value;
        let image_url = document.getElementById('existingImageUrl').value;
        const fileInput = document.getElementById('imageFile');
        if (fileInput.files.length > 0) {
            try {
                image_url = await uploadImage(fileInput.files[0]);
                showStatus('图片上传成功', 'success');
            } catch (err) {
                showStatus('图片上传失败: ' + err.message, 'error');
                return;
            }
        }
        const pointData = { name, latitude, longitude, image_url, description, province, city };
        try {
            if (currentMode === 'add') {
                await savePoint(pointData, 'add');
                showStatus('添加成功', 'success');
            } else {
                const id = document.getElementById('editId').value;
                await savePoint(pointData, 'edit', id);
                showStatus('更新成功', 'success');
            }
            showForm(false);
            fetchPoints();
        } catch (err) {
            showStatus('操作失败: ' + err.message, 'error');
        }
    };

    document.getElementById('refreshBtn').onclick = fetchPoints;
    fetchPoints();
</script>
</body>
</html>
