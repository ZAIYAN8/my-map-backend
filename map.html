<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>无敌火影大王</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .filter-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: rgba(255,255,255,0.95);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }
        .filter-bar select, .refresh-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .refresh-btn {
            background: #2c7da0;
            color: white;
        }
        .top-left-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1002;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .datav-link {
            background: #ffffff;
            padding: 6px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.2s;
            white-space: nowrap;
            border: 1px solid #e9ecef;
            text-align: center;
        }
        .datav-link a {
            color: #2c7da0;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .datav-link:hover {
            background: #f5f5f5;
            transform: scale(1.02);
        }
        .user-bar {
            background: rgba(255,255,255,0.95);
            padding: 8px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            border: 1px solid #e9ecef;
        }
        .user-bar a {
            color: #2c7da0;
            text-decoration: none;
            font-weight: bold;
        }
        .user-bar a:hover { text-decoration: underline; }
        .user-bar .username { color: #555; }
        .user-bar .sep { color: #ccc; }
        .login-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: rgba(255,255,255,0.96);
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-hint p { font-size: 16px; color: #555; margin-bottom: 16px; }
        .login-hint a {
            display: inline-block;
            padding: 10px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s;
        }
        .login-hint a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102,126,234,0.4);
        }
        .info-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            bottom: 20px;
            width: 420px;
            max-width: 90vw;
            background: rgba(255,255,255,0.96);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 20px;
            font-size: 15px;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(8px);
            border-left: 6px solid #3498db;
            overflow-y: auto;
        }
        .info-panel h3 {
            margin: 0 0 12px 0;
            color: #2c7da0;
            font-size: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 6px;
        }
        .info-panel img {
            max-width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin: 12px 0;
        }
        .info-panel p {
            margin: 8px 0;
            line-height: 1.5;
            color: #333;
        }
        .info-panel .location {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
            border-top: 1px dashed #ccc;
            padding-top: 8px;
        }
        .close-panel { float: right; cursor: pointer; font-weight: bold; font-size: 18px; color: #888; }
        .close-panel:hover { color: #333; }
        .empty-panel { color: #999; text-align: center; padding: 20px; }
        @media (max-width: 768px) {
            .info-panel { width: 300px; top: 70px; right: 10px; bottom: 10px; }
            .filter-bar { top: 10px; right: 10px; padding: 6px 10px; }
            .top-left-panel { top: 10px; left: 10px; }
            .datav-link { padding: 4px 12px; }
            .datav-link a { font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="filter-bar">
    <span>选择城市：</span>
    <select id="citySelect"><option value="all">全部</option></select>
    <button class="refresh-btn" onclick="location.reload();">刷新数据</button>
</div>

<div class="top-left-panel">
    <div class="user-bar" id="userBar">
        <span id="userInfo"></span>
    </div>
    <div class="datav-link">
        <a href="/datav/" target="_blank">进入3D屏</a>
    </div>
</div>

<div class="login-hint" id="loginHint" style="display:none;">
    <p>请先登录后查看地图数据</p>
    <a href="/login.html">前往登录</a>
</div>

<div id="map"></div>
<div id="infoPanel" class="info-panel">
    <span class="close-panel" onclick="closePanel()">×</span>
    <div id="panelContent"><div class="empty-panel">点击地图上的标记<br>显示详细信息</div></div>
</div>

<script>
    const esriImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP',
        maxZoom: 18
    });
    const esriStreet = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri, HERE, Garmin, USGS',
        maxZoom: 18
    });
    const baseMaps = { "Esri 卫星影像": esriImagery, "Esri 电子地图": esriStreet };
    const map = L.map('map', { layers: [esriImagery], maxZoom: 18, minZoom: 3 }).setView([25.78912, 100.195062], 10);
    L.control.layers(baseMaps, null, { position: 'bottomleft' }).addTo(map);

    const markersLayer = L.layerGroup().addTo(map);
    let allPointsData = [];

    // 检查登录状态并初始化页面
    async function initPage() {
        try {
            const res = await fetch('/api/auth/check', { credentials: 'include' });
            const data = await res.json();
            if (data.logged_in) {
                document.getElementById('userInfo').innerHTML = '已登录 <span class="sep">|</span> <a href="/admin.html">运维管理</a> <span class="sep">|</span> <a href="/logout">退出</a>';
                loadPoints();
            } else {
                document.getElementById('userInfo').innerHTML = '未登录 <span class="sep">|</span> <a href="/login.html">登录</a>';
                document.getElementById('loginHint').style.display = 'block';
            }
        } catch (err) {
            document.getElementById('userInfo').innerHTML = '未登录 <span class="sep">|</span> <a href="/login.html">登录</a>';
            document.getElementById('loginHint').style.display = 'block';
        }
    }

    async function loadPoints() {
        try {
            const res = await fetch('/api/points', { credentials: 'include' });
            if (res.status === 401) {
                document.getElementById('loginHint').style.display = 'block';
                document.getElementById('userInfo').innerHTML = '未登录 <span class="sep">|</span> <a href="/login.html">登录</a>';
                return;
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            allPointsData = data.features || [];
            const cities = new Set();
            allPointsData.forEach(f => {
                const city = f.properties.city;
                if (city && city.trim()) cities.add(city);
            });
            const citySelect = document.getElementById('citySelect');
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });
            filterByCity('all');
        } catch (err) {
            console.error('加载点位失败:', err);
            document.getElementById('panelContent').innerHTML = '<div class="empty-panel">加载点位数据失败，请检查后端服务</div>';
        }
    }

    function filterByCity(selected) {
        markersLayer.clearLayers();
        const filtered = (selected === 'all') ? allPointsData : allPointsData.filter(f => f.properties.city === selected);
        if (filtered.length === 0) return;
        const bounds = [];
        filtered.forEach(f => {
            const coords = f.geometry.coordinates;
            const latlng = [coords[1], coords[0]];
            bounds.push(latlng);
            const marker = L.marker(latlng).addTo(markersLayer);
            marker.on('click', () => showInfo(f.properties));
        });
        map.fitBounds(L.latLngBounds(bounds), { padding: [50, 50] });
    }

    function showInfo(props) {
        const panel = document.getElementById('infoPanel');
        const content = document.getElementById('panelContent');
        const imgUrl = props.image_url || '';
        content.innerHTML = `
            <h3>${escapeHtml(props.name) || '未命名'}</h3>
            ${imgUrl ? `<img src="${imgUrl}" alt="图片" onerror="this.onerror=null;this.src='';this.alt='图片加载失败'">` : ''}
            <p>${escapeHtml(props.description) || '暂无描述'}</p>
            <div class="location">${escapeHtml(props.city) || ''}${props.city && props.province ? '，' : ''}${escapeHtml(props.province) || ''}</div>
        `;
        panel.style.display = 'block';
    }

    function closePanel() { document.getElementById('infoPanel').style.display = 'none'; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&','<':'<','>':'>'})[m]); }

    document.getElementById('citySelect').addEventListener('change', e => { filterByCity(e.target.value); closePanel(); });
    initPage();
</script>
</body>
</html>
