<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧地图服务平台 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
        }
        .login-card .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .login-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a2a3a;
            margin-bottom: 8px;
        }
        .login-card .subtitle {
            font-size: 0.9rem;
            color: #8899aa;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334455;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8edf2;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .captcha-row input {
            flex: 1;
        }
        .captcha-img {
            width: 120px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e8edf2;
            transition: border-color 0.2s;
        }
        .captcha-img:hover {
            border-color: #667eea;
        }
        .captcha-hint {
            font-size: 12px;
            color: #8899aa;
            margin-top: 4px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-msg {
            background: #fff3f3;
            color: #e74c3c;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            border-left: 4px solid #e74c3c;
            text-align: left;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #8899aa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">🗺️</div>
    <h1>智慧地图服务平台</h1>
    <p class="subtitle">请输入账号、密码和验证码</p>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="captcha">验证码</label>
            <div class="captcha-row">
                <input type="text" id="captcha" placeholder="输入验证码" required maxlength="4" autocomplete="off">
                <img id="captchaImg" class="captcha-img" alt="验证码" title="点击刷新验证码">
            </div>
            <p class="captcha-hint">点击图片可刷新验证码</p>
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">进入平台</button>
    </form>
    
    <a href="./map.html" class="back-link">← 返回地图展示端</a>
</div>

<script>
    const API_BASE = '';
    
    // 加载验证码
    async function loadCaptcha() {
        try {
            const res = await fetch(`${API_BASE}/api/captcha`);
            const data = await res.json();
            document.getElementById('captchaImg').src = data.image;
            document.getElementById('captcha').value = '';
        } catch (err) {
            console.error('加载验证码失败:', err);
        }
    }
    
    // 点击验证码图片刷新
    document.getElementById('captchaImg').addEventListener('click', loadCaptcha);
    
    // 显示错误信息
    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
    
    function hideError() {
        document.getElementById('errorMsg').style.display = 'none';
    }
    
    // 表单提交
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const captcha = document.getElementById('captcha').value.trim();
        
        if (!username) {
            showError('请输入用户名');
            return;
        }
        if (!password) {
            showError('请输入密码');
            return;
        }
        if (!captcha) {
            showError('请输入验证码');
            return;
        }
        
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = '验证中...';
        
        try {
            const res = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, captcha }),
                credentials: 'include'
            });
            
            const data = await res.json();
            
            if (data.success) {
                // 登录成功，跳转到 portal
                window.location.href = './map.html';
            } else {
                showError(data.message || '登录失败');
                loadCaptcha(); // 刷新验证码
            }
        } catch (err) {
            showError('网络错误，请重试');
            loadCaptcha();
        } finally {
            btn.disabled = false;
            btn.textContent = '进入平台';
        }
    });
    
    // 页面加载时获取验证码
    loadCaptcha();
</script>
</body>
</html>
